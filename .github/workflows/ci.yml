name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.25"
          enable-cache: true

      - name: Install dependencies (with dev group)
        run: uv sync --dev --frozen

      - name: Run tests (hermetic — no secrets, no network)
        run: uv run pytest -q

      - name: Docker build (no push — catch a broken Dockerfile)
        run: docker build -t equip-rag-api:ci .
